services:
  db:
    image: postgres:17-alpine
    ports:
      - "35432:5432"
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
